<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pick My Place - Results</title>
    <meta
      name="description"
      content="Your Pick My Place results: ranked destinations, save picks to a shortlist, copy as text, and clear options—all stored in your browser."
    />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <meta property="og:title" content="Pick My Place — Results" />
    <meta
      property="og:description"
      content="View ranked matches, saved picks, and export your travel shortlist from Pick My Place."
    />
    <meta property="og:type" content="website" />
    <!-- Deploy: replace __PICKMYPLACE_SITE__ with your public origin. No trailing slash. See DEPLOY.md -->
    <link rel="canonical" href="__PICKMYPLACE_SITE__/results.html" />
    <meta property="og:url" content="__PICKMYPLACE_SITE__/results.html" />
    <meta property="og:image" content="__PICKMYPLACE_SITE__/favicon.svg" />
    <meta property="og:image:alt" content="Pick My Place results" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:image" content="__PICKMYPLACE_SITE__/favicon.svg" />
    <meta name="twitter:title" content="Pick My Place — Results" />
    <meta
      name="twitter:description"
      content="View ranked matches, saved picks, and export your travel shortlist."
    />
    <meta name="theme-color" content="#0b7a75" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="results-page">
    <main class="app-shell">
      <header class="app-header">
        <h1>Your Travel Results</h1>
        <p>Here are your ranked destination matches, tuned to what you selected.</p>
      </header>

      <section class="panel results-panel">
        <div class="results-header">
          <h2>Your Top Matches</h2>
          <p id="prefSummary" class="pref-summary" hidden></p>
          <div id="gentleNotes" class="gentle-notes" role="status" aria-live="polite" hidden></div>
          <p id="statusText" aria-live="polite"></p>
        </div>
        <div class="action-row">
          <a class="action-link" href="index.html">Edit Preferences</a>
          <a class="action-link" href="about.html">About This Project</a>
          <button type="button" id="clearBtn">Clear Saved Results</button>
          <button type="button" id="clearPicksBtn" class="btn-secondary">
            Clear Saved Picks
          </button>
          <button type="button" id="copyResultsBtn" class="btn-secondary">
            Copy results as text
          </button>
        </div>

        <section class="saved-picks-panel" id="savedPicksSection" aria-labelledby="savedPicksHeading">
          <h3 id="savedPicksHeading">Your saved picks</h3>
          <p class="saved-picks-hint">
            Save individual destinations below — they stay here until you remove them (even after clearing full results).
          </p>
          <div id="savedPicksGrid" class="saved-picks-grid"></div>
        </section>

        <h3 class="results-subheading">All ranked matches</h3>
        <div id="results" class="results-grid"></div>
      </section>
    </main>

    <script src="results.js"></script>
  </body>
</html>
